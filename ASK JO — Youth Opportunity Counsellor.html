  }

      --bg:     #0d1a16;
      --card:   #121e19;

  }

  }

    height: 100%;

    background: var(--bg);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }


  /* ── App Shell ── */

    width: 100%;
    max-width: 700px;
    background: var(--card);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 96vh;
    max-height: 820px;
  }

    position: relative;

    flex-shrink: 0;

  }

    position: relative;

  }

    align-items: center;

  }

    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ava span {
    font-size: 22px;
    font-weight: 700;
    color: var(--teal-wash);
    letter-spacing: -0.5px;
  }

  .hmeta { flex: 1; }

  .hmeta h1 {
    font-size: 19px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .hmeta p {
    font-size: 12.5px;
    color: var(--teal-pale);
    margin-top: 3px;
  }

  .online {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal-light);
    animation: pulse 2.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .4; }
  }

  .online span {
    font-size: 11px;
    color: var(--teal-pale);
  }

  .lbrow { display: flex; gap: 5px; }

  .lb {
    font-size: 11px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.22);
    background: transparent;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all .15s;
  }

    background: rgba(255,255,255,0.2);
    color: #fff;
    border-color: rgba(255,255,255,0.55);
  }

  .tbar {
    background: var(--teal-deep);

    overflow-x: auto;

    color: var(--teal-light);
    border-color: rgba(93,202,165,0.4);
  }

  .bub {
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .row.jo .bub {
    background: var(--card);

    border: 1px solid var(--border);

    background: var(--teal-base);

    gap: 9px;

    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal-base);
    animation: bop 1.1s ease-in-out infinite;
  }

  .tbub span:nth-child(2) { animation-delay: .2s; }
  .tbub span:nth-child(3) { animation-delay: .4s; }

    padding: 9px 13px 8px;

  .sq:hover {
    background: var(--teal-wash);
    color: var(--teal-deep);
    border-color: var(--teal-light);
  }

    display: flex;
    gap: 9px;
    align-items: flex-end;
    background: var(--card);

    resize: none;
    font-size: 14px;
    padding: 10px 15px;
    border-radius: 24px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);

    max-height: 100px;
    overflow-y: auto;
    outline: none;
    transition: border-color .15s;

  .izone textarea::placeholder { color: var(--faint); }

  .sbtn {
    width: 43px;
    height: 43px;
    border-radius: 50%;
    background: var(--teal-base);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }

  .sbtn:hover    { background: var(--teal-mid); }
  .sbtn:disabled { background: var(--border); cursor: not-allowed; }
  .sbtn i        { color: #fff; font-size: 18px; }
  .sbtn:disabled i { color: var(--faint); }


  /* ── Footer ── */
  .foot {
    text-align: center;
    font-size: 11px;
    color: var(--faint);
    padding: 8px;
    background: var(--card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .foot a {
    color: var(--teal-base);
    text-decoration: none;
  }

</style>

    av.textContent = role === 'jo' ? 'Jo' : 'You';
    const wrap = document.createElement('div');
    wrap.className = 'bwrap';
    const bub  = document.createElement('div');
    bub.className = 'bub';
    bub.innerHTML = text
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,     '<em>$1</em>')
      .replace(/\[(.*?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--teal-base);text-decoration:underline">$1</a>')
      .replace(/\n/g, '<br>');
    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = now();
    wrap.appendChild(bub);
    wrap.appendChild(ts);
    row.appendChild(av);
    row.appendChild(wrap);
    ms.appendChild(row);
    ms.scrollTop = ms.scrollHeight;
  }


  /* ── Render Topics & Suggestions ── */
  function renderTopics() {
    const tb = document.getElementById('tbar');
    tb.innerHTML = '';
    topics[lang].forEach(t => {
      const b = document.createElement('button');
      b.className = 'tc';
      b.innerHTML = `<i class="ti ${t.i}"></i>${t.l}`;
      b.onclick = () => { document.getElementById('inp').value = t.q; send(); };
      tb.appendChild(b);
    });
  }

  function renderSugs() {
    const sr = document.getElementById('sugrow');
    sr.innerHTML = '';
    sugs[lang].slice(0, 5).forEach(s => {
      const b = document.createElement('button');
      b.className = 'sq';
      b.textContent = s;
      b.onclick = () => { document.getElementById('inp').value = s; send(); };
      sr.appendChild(b);
    });
  }


  /* ── Web Search ──
     Strategy: Try 3 free sources in order. First one that returns data wins. */
  async function webSearch(query) {
    const date   = new Date().toLocaleDateString();
    const header = `[LIVE WEB SEARCH — "${query}" — ${date}]\n\n`;

    // SOURCE 1: DuckDuckGo Instant Answers (best for factual/definition queries)
    try {
      const ddg = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
      const r   = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(ddg)}`, { signal: AbortSignal.timeout(5000) });
      const raw = await r.json();
      const d   = JSON.parse(raw.contents);
      let ctx = '', found = false;
      if (d.Answer) { ctx += `Answer: ${d.Answer}\n\n`; found = true; }
      if (d.Abstract?.length > 60) { ctx += `Summary: ${d.Abstract}\nMore: ${d.AbstractURL}\n\n`; found = true; }
      if (d.RelatedTopics?.length) {
        const items = d.RelatedTopics.filter(t => t.Text).slice(0, 5);
        if (items.length) { ctx += `Related:\n` + items.map(t => `- ${t.Text}`).join('\n') + '\n\n'; found = true; }
      }
      if (found) return header + ctx;
    } catch(e) {}

    // SOURCE 2: Wikipedia REST API (great for educational questions)
    try {
      const wikiQ = query.replace(/[?]/g, '').trim();
      const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiQ)}`, { signal: AbortSignal.timeout(4000) });
      if (r.ok) {
        const d = await r.json();
        if (d.extract && d.extract.length > 80) {
          return header + `From Wikipedia:\n${d.extract}\nRead more: ${d.content_urls?.desktop?.page || ''}\n\n`;
        }
      }
    } catch(e) {}

    // SOURCE 3: No live results — return curated knowledge pointers so Jo gives best possible answer
    const pointers = {
      scholarship: 'opportunitydesk.org, opportunitiesforafricans.com, scholarshipscorner.net, mastercardfdn.org, tonyelumelufoundation.org',
      job:         'jobberman.com, linkedin.com/jobs, indeed.com, myjobmag.com, glassdoor.com',
      grant:       'tonyelumelufoundation.org, orangecorners.com, giz.de, afd.fr, opportunitydesk.org',
      training:    'alxafrica.com, andela.com, coursera.org, edx.org, google.com/certificates',
      business:    'fnecamer.cm, acms.cm, minepmesa.cm, tonyelumelufoundation.org',
      default:     'opportunitiesforafricans.com, opportunitydesk.org, alxafrica.com, jobberman.com'
    };
    const q   = query.toLowerCase();
    const src = q.includes('scholarship') || q.includes('bourse')                  ? pointers.scholarship
              : q.includes('job')         || q.includes('emploi') || q.includes('work') ? pointers.job
              : q.includes('grant')       || q.includes('fund')   || q.includes('financement') ? pointers.grant
              : q.includes('training')    || q.includes('course') || q.includes('formation')   ? pointers.training
              : q.includes('business')    || q.includes('entreprise') || q.includes('startup') ? pointers.business
              : pointers.default;

    return `${header}No direct search results found. Use your extensive knowledge to give the best current answer about "${query}" as of ${date}. Direct the user to these authoritative websites for up-to-date listings: ${src}. Be specific about what they'll find on each site.`;
  }


  /* ── Send ── */
  async function send() {
    if (busy) return;
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = 'auto';
    addMsg('me', text);
    hist.push({ role:'user', content:text });
    busy = true;
    document.getElementById('sbtn').disabled = true;

    let searchCtx = null;
    if (needsSearch(text) || text.trim().endsWith('?')) {
      showSearching();
      searchCtx = await webSearch(text);
      removeSearching();
    }

    showTyping();

    const messages = [
      { role:'system', content: SYS[lang] },
      ...hist.slice(0, -1).map(m => ({
        role:    m.role === 'assistant' ? 'assistant' : 'user',
        content: m.content
      })),
      { role:'user', content: searchCtx ? `${searchCtx}\nUser question: ${text}` : text }
    ];

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:  'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + GROQ_KEY },
        body: JSON.stringify({
          model:       'llama-3.3-70b-versatile',
          max_tokens:  2048,
          temperature: 0.7,
          messages
        })
      });
      const d = await res.json();
      removeTyping();
      if (d.error) {
        addMsg('jo', '⚠️ ' + d.error.message + '\n\nPlease check your Groq API key at console.groq.com');
      } else {
        const reply = d.choices?.[0]?.message?.content || 'Something went wrong. Please try again.';
        addMsg('jo', reply);
        hist.push({ role:'assistant', content:reply });
        if (hist.length > 40) hist = hist.slice(-40);
      }
    } catch(err) {
      removeTyping();
      addMsg('jo', lang === 'en'
        ? 'Connection error. Please check your internet connection and try again.'
        : 'Erreur de connexion. Vérifiez votre connexion internet et réessayez.');
    }

    busy = false;
    document.getElementById('sbtn').disabled = false;
  }


  /* ── Input Helpers ── */
  function hk(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function ar(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function setLang(l) {
    lang = l;
    document.getElementById('ben').classList.toggle('on', l === 'en');
    document.getElementById('bfr').classList.toggle('on', l === 'fr');
    document.getElementById('inp').placeholder = l === 'en'
      ? 'Ask Jo anything — jobs, school, health, life…'
      : 'Posez n\'importe quelle question à Jo…';
    renderTopics();
    renderSugs();
  }


  /* ── Spin Keyframe (for search indicator) ── */
  const ss = document.createElement('style');
  ss.textContent = '@keyframes spin { to { transform: rotate(360deg) } }';
  document.head.appendChild(ss);


  /* ── Init ── */
  renderTopics();
  renderSugs();
  addMsg('jo', welcome[lang]);

</script>
</html>
